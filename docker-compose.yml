version: "3.9"

services:
  api:
    build: .
    ports:
      - "8008:8008"
    env_file:
      - .env
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models
    command: uvicorn src.api.serve:app --host 0.0.0.0 --port 8008
    depends_on:
      - postgres

  trainer:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models
    command: sh -c "python -m src.ml.train && python -m src.database.seed_db --limit ${SEED_LIMIT:-100}"
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: churn
      POSTGRES_USER: app
      POSTGRES_PASSWORD: changeme
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:7
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@company.com
      PGADMIN_DEFAULT_PASSWORD: changeme
    volumes:
      - pgadmin_data:/var/lib/pgadmin
volumes:
  postgres_data:
  pgadmin_data:
